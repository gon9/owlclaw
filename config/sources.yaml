obsidian_vault: "/Users/gon9a/Library/CloudStorage/GoogleDrive-gon9a.chan@gmail.com/マイドライブ/workspace/obsidian_drive"
obsidian_subdir: "owlclaw/daily"

digest:
  max_items: 6
  lookback_hours: 24
  language: ja
  persona: |
    読者は日本のSaaS企業の社員。
    関心: AI業界トレンド（モデル / プロダクト / 資金調達 / 研究）、海外組織モデル（FDE等）、SaaS経営示唆。
    日本の読者向けに要約・翻訳する。固有名詞は原語を残す。

sources:
  # --- ニュース / ジャーナリズム ---
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    type: rss
    enabled: true

  # --- VC / 投資家視点 ---
  - name: a16z
    url: https://www.a16z.news/feed  # 旧 a16z.com/feed/ は404。Substack経由
    type: rss
    enabled: true

  # --- AIモデル / 研究 ---
  - name: OpenAI Blog
    url: https://openai.com/news/rss.xml
    type: rss
    enabled: true

  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    type: rss
    enabled: true

  # --- エンジニア向けニュースレター ---
  - name: The Pragmatic Engineer
    url: https://newsletter.pragmaticengineer.com/feed
    type: rss
    enabled: true

  - name: Latent Space
    url: https://latent.space/feed
    type: rss
    enabled: true  # AI Engineerコミュニティで最も読まれているニュースレターの一つ

  - name: Import AI
    url: https://importai.substack.com/feed
    type: rss
    enabled: true  # Anthropic共同創業者 Jack Clark による週次リサーチ解説

  - name: TLDR AI
    url: https://tldrnewsletter.substack.com/feed
    type: rss
    enabled: true  # 50万人以上が購読するAI日次ダイジェスト

  - name: TheSequence
    url: https://thesequence.substack.com/feed
    type: rss
    enabled: true  # OpenAI/DeepMind等のエンジニアが読むML深掘りニュースレター

