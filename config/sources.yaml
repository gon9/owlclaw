digest:
  max_items: 6
  lookback_hours: 24
  language: ja
  persona: |
    読者は日本のSaaS企業の社員。
    関心: AI業界トレンド（モデル / プロダクト / 資金調達 / 研究）、海外組織モデル（FDE等）、SaaS経営示唆。
    日本の読者向けに要約・翻訳する。固有名詞は原語を残す。

sources:
  # --- ニュース / ジャーナリズム ---
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    type: rss
    enabled: true

  # --- VC / 投資家視点 ---
  - name: a16z
    url: https://www.a16z.news/feed  # 旧 a16z.com/feed/ は404。Substack経由
    type: rss
    enabled: true

  # --- AIモデル / 研究 ---
  - name: OpenAI Blog
    url: https://openai.com/news/rss.xml
    type: rss
    enabled: true

  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    type: rss
    enabled: true

  # --- AI-native企業・注目スタートアップ ---
  - name: Sakana AI Blog
    url: https://sakana.ai/feed.xml
    type: rss
    enabled: true  # 東京発AI-native研究企業。Applied AI Teamなど組織モデルも参考になる

  - name: Ramp Builders
    url: https://builders.ramp.com/feed.xml
    type: rss
    enabled: true  # AI-first Fintech Rampのエンジニアリングブログ。実践的AI活用事例

