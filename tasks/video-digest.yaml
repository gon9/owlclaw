id: video-digest
description: AI ニュース動画ダイジェスト（daily-digest 成果物から top_n 件をピックして動画化）
schedule:
  type: cron
  expr: "30 7 * * *"            # 毎朝 7:30 JST（daily-digest の 30 分後）
input:
  from_task: daily-digest        # 同日に実行された daily-digest の成果物を読む
  file: note_draft.md            # 取り込むファイル名（task_dir/note_draft.md）
prompt:
  task_md: prompts/video-script.md
  standing_order_md: prompts/standing-order.md
state:
  namespace: video-digest
outputs:
  - type: video
    slack_notify: true            # 完成通知を Slack に投稿 (Drive URL 付き)
    drive_upload: true            # Google Drive API にアップロード + 共有リンク取得
    drive_folder: "owlclaw/video-digest"  # Drive 上の保存先 (階層 OK)
    # obsidian_subdir は廃止: Drive API があれば冗長で Obsidian Vault が汚れるため。
    # 復活したければ obsidian_subdir: "owlclaw/video" を追加 (Vault 内に同期コピーされる)
    retention_days: 7             # 古いローカル動画は N 日経過で自動削除
allowed_tools: "Read,Write"
video:
  top_n: 1                        # ピックアップ件数（1, 3, 5 など。動画スライド数は top_n + 2: hero + N + summary）
quiet_hours:
  start: "22:00"
  end: "07:00"
