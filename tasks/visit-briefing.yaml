id: visit-briefing
description: 翌日の訪問先ブリーフィング生成（毎晩 20:00）
schedule:
  type: cron
  expr: "0 20 * * *"           # 毎晩 20:00 JST
sources:
  - type: calendar
    range: tomorrow
    calendar_id: primary
    filter:
      location_kind: physical          # 物理開催のみ（オンライン会議は除外）
      # attendees_have_external は外す: 参加者なしの個人外出（食事・通院・美容院等）も
      # 翌日リマインド対象に含める。種別の出し分けはプロンプト側で行う。
prompt:
  task_md: prompts/visit-briefing.md
  standing_order_md: prompts/standing-order.md
state:
  namespace: visit-briefing
outputs:
  - type: slack
  - type: obsidian
    path_template: "Briefings/{date}-visit-briefing.md"
allowed_tools: "Read,Write,WebSearch,WebFetch"
