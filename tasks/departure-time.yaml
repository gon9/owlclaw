id: departure-time
description: 当日の物理外出予定スキャン → 出発時刻・交通手段通知（毎朝 7:00）
schedule:
  type: cron
  expr: "0 7 * * *"           # 毎朝 7:00 JST
sources:
  - type: calendar
    range: today
    calendar_id: primary
    filter:
      location_kind: physical          # オンライン会議を除外
      attendees_have_external: any     # 外部参加者あり (社外打ち合わせ)
    owner_domain: null                 # null の場合は参加者が 1 人以上いれば外部判定
prompt:
  task_md: prompts/departure-time.md
  standing_order_md: prompts/standing-order.md
state:
  namespace: departure-time
outputs:
  - type: slack
allowed_tools: "Read,Write,WebSearch,WebFetch"
